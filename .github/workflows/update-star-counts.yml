name: Update README Star Counts

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Bundle with ESBuild
        run: |
          npx esbuild scripts/update_readme_stars.js --bundle --platform=node --outfile=dist/update_stars.cjs

      - name: Update star counts
        run: node dist/update_stars.cjs

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet && echo "No changes to commit" || {
            git commit -m "chore: update README star counts"
            git push
          }
